name: Selective Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_release_all:
        description: 'Force release all packages regardless of changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Package Changes
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.changes.outputs.ui }}
      common: ${{ steps.changes.outputs.common }}
      auth: ${{ steps.changes.outputs.auth }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            ui:
              - 'packages/ui/**'
              - 'packages/ui/.releaserc.json'
            common:
              - 'packages/common/**'
              - 'packages/common/.releaserc.json'
            auth:
              - 'packages/auth/**'
              - 'packages/auth/.releaserc.json'

  release-common:
    name: Release Common Package
    needs: detect-changes
    if: needs.detect-changes.outputs.common == 'true' || needs.detect-changes.outputs.ui == 'true' || needs.detect-changes.outputs.auth == 'true' || inputs.force_release_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build Common package
        run: |
          cd packages/common
          pnpm build

      - name: Release Common package
        if: needs.detect-changes.outputs.common == 'true' || inputs.force_release_all == 'true'
        run: |
          cd packages/common
          if [ "${{ inputs.force_release_all }}" = "true" ]; then
            pnpm release --force
          else
            pnpm release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-ui:
    name: Release UI Package
    needs: [detect-changes, release-common]
    if: needs.detect-changes.outputs.ui == 'true' || inputs.force_release_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release UI package
        run: |
          cd packages/ui
          if [ "${{ inputs.force_release_all }}" = "true" ]; then
            pnpm release --force
          else
            pnpm release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-auth:
    name: Release Auth Package
    needs: [detect-changes, release-common]
    if: needs.detect-changes.outputs.auth == 'true' || inputs.force_release_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release Auth package
        run: |
          cd packages/auth
          if [ "${{ inputs.force_release_all }}" = "true" ]; then
            pnpm release --force
          else
            pnpm release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}