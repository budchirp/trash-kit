name: Manual Release All Packages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual release (e.g., "Selective release failed", "Emergency release")'
        required: true
        default: 'Manual release triggered'
      skip_common:
        description: 'Skip common package release'
        required: false
        default: false
        type: boolean
      skip_ui:
        description: 'Skip UI package release'
        required: false
        default: false
        type: boolean
      skip_auth:
        description: 'Skip auth package release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-common:
    name: Release Common Package
    if: ${{ !inputs.skip_common }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build Common package
        run: |
          cd packages/common
          pnpm build

      - name: Release Common package
        run: |
          cd packages/common
          pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-ui:
    name: Release UI Package
    needs: release-common
    if: ${{ !inputs.skip_ui }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build Common package (dependency)
        run: |
          cd packages/common
          pnpm build

      - name: Release UI package
        run: |
          cd packages/ui
          pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-auth:
    name: Release Auth Package
    needs: release-common
    if: ${{ !inputs.skip_auth }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build Common package (dependency)
        run: |
          cd packages/common
          pnpm build

      - name: Release Auth package
        run: |
          cd packages/auth
          pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-summary:
    name: Create Release Summary
    needs: [release-common, release-ui, release-auth]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create Summary
        run: |
          echo "## Manual Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Package Release Status:" >> $GITHUB_STEP_SUMMARY
          echo "- **Common:** ${{ needs.release-common.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UI:** ${{ needs.release-ui.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auth:** ${{ needs.release-auth.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
